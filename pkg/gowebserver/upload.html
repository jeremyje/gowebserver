<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Files</title>
  <link rel="canonical" href="{{.UploadHTTPPath}}">
  <style>
    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f6f8;
      --text: #1a1a1a;
      --text-secondary: #555;
      --border: #dde0e4;
      --hover-bg: #e8eaee;
      --link: #0366d6;
      --shadow: rgba(0, 0, 0, 0.06);
      --upload-glow: rgba(3, 102, 214, 0.12);
      --success: #16a34a;
      --error: #ef4444;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1b1e;
        --bg-secondary: #232528;
        --text: #e0e0e0;
        --text-secondary: #999;
        --border: #3a3d42;
        --hover-bg: #35383e;
        --link: #58a6ff;
        --shadow: rgba(0, 0, 0, 0.2);
        --upload-glow: rgba(88, 166, 255, 0.14);
        --success: #4ade80;
        --error: #f87171;
      }
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      padding: 16px;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    /* ===== Upload card ===== */
    .upload-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 32px;
      overflow: hidden;
    }

    /* ===== Drop zone ===== */
    .drop-zone {
      position: relative;
      padding: 64px 24px;
      text-align: center;
      background: var(--bg);
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .drop-zone:hover:not(.is-dragover):not(.is-uploading):not(.is-success):not(.is-error) {
      background: var(--bg-secondary);
    }

    .drop-zone.is-dragover {
      background: var(--bg-secondary);
    }

    .drop-zone.is-uploading,
    .drop-zone.is-success,
    .drop-zone.is-error {
      cursor: default;
    }

    /* ===== SVG marching-ants border ===== */
    .drop-outline {
      position: absolute;
      inset: 12px;
      width: calc(100% - 24px);
      height: calc(100% - 24px);
      pointer-events: none;
      overflow: visible;
      transition: opacity 0.2s ease;
    }

    .drop-outline-rect {
      width: 100%;
      height: 100%;
      fill: none;
      stroke: var(--border);
      stroke-width: 2;
      stroke-dasharray: 8 8;
      transition: stroke 0.2s ease;
    }

    /* Hover: outline brightens */
    .drop-zone:hover:not(.is-dragover):not(.is-uploading):not(.is-success):not(.is-error) .drop-outline-rect {
      stroke: var(--text-secondary);
    }

    /* Dragover: march + turn blue */
    .drop-zone.is-dragover .drop-outline-rect {
      stroke: var(--link);
      animation: march 0.35s linear infinite;
    }

    @keyframes march {
      to { stroke-dashoffset: -16; }
    }

    /* Hide outline in active states */
    .drop-zone.is-uploading .drop-outline,
    .drop-zone.is-success .drop-outline,
    .drop-zone.is-error .drop-outline {
      opacity: 0;
    }

    /* ===== Drop ripple on drop event ===== */
    .drop-zone.is-dropped::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 4px;
      background: radial-gradient(circle at center, var(--upload-glow) 0%, transparent 65%);
      animation: drop-ripple 0.55s ease forwards;
      pointer-events: none;
    }

    @keyframes drop-ripple {
      0%   { opacity: 0.9; transform: scale(0.25); }
      100% { opacity: 0;   transform: scale(1.4); }
    }

    /* ===== Drop content (icon + label) ===== */
    .drop-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      position: relative;
    }

    .drop-zone.is-uploading .drop-content,
    .drop-zone.is-success .drop-content,
    .drop-zone.is-error .drop-content {
      visibility: hidden;
    }

    /* ===== Upload icon ===== */
    .upload-icon {
      width: 52px;
      height: 52px;
      color: var(--text-secondary);
      transition: color 0.2s ease;
      flex-shrink: 0;
      overflow: visible;
    }

    /* Idle: gentle float */
    .drop-zone:not(.is-dragover):not(.is-uploading):not(.is-success):not(.is-error) .upload-icon {
      animation: icon-float 3s ease-in-out infinite;
    }

    @keyframes icon-float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-7px); }
    }

    /* Hover: icon brightens */
    .drop-zone:hover:not(.is-dragover):not(.is-uploading):not(.is-success):not(.is-error) .upload-icon {
      color: var(--link);
    }

    /* Dragover: icon turns blue, float stops, arrow flies upward in a loop */
    .drop-zone.is-dragover .upload-icon {
      color: var(--link);
      animation: none;
    }

    .drop-zone.is-dragover .upload-arrow {
      animation: upload-fly 0.75s ease-in-out infinite;
    }

    @keyframes upload-fly {
      0%   { transform: translateY(0);    opacity: 1; }
      55%  { transform: translateY(-16px); opacity: 0; }
      56%  { transform: translateY(10px);  opacity: 0; }
      85%  { transform: translateY(0);    opacity: 1; }
      100% { transform: translateY(0);    opacity: 1; }
    }

    /* ===== File input (hidden) ===== */
    .file-input {
      width: 0.1px;
      height: 0.1px;
      opacity: 0;
      overflow: hidden;
      position: absolute;
      z-index: -1;
    }

    .drop-label {
      font-size: 0.95rem;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .drop-label-strong {
      color: var(--link);
      font-weight: 600;
    }

    .drop-label:hover .drop-label-strong {
      text-decoration: underline;
    }

    .drop-hint {
      font-size: 0.78rem;
      color: var(--text-secondary);
      opacity: 0.6;
    }

    /* ===== State overlays ===== */
    .status {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: var(--bg);
    }

    .drop-zone.is-uploading .status-uploading,
    .drop-zone.is-success  .status-success,
    .drop-zone.is-error    .status-error {
      display: flex;
    }

    /* ===== SVG snake spinner ===== */
    .upload-spinner {
      width: 48px;
      height: 48px;
      animation: spinner-rotate 2s linear infinite;
      transform-origin: center center;
    }

    .spinner-track {
      fill: none;
      stroke: var(--border);
      stroke-width: 3.5;
    }

    .spinner-arc {
      fill: none;
      stroke: var(--link);
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-dasharray: 1, 125;
      stroke-dashoffset: 0;
      animation: spinner-dash 1.5s ease-in-out infinite;
    }

    @keyframes spinner-rotate {
      100% { transform: rotate(360deg); }
    }

    @keyframes spinner-dash {
      0%   { stroke-dasharray: 1,  125; stroke-dashoffset: 0;    }
      50%  { stroke-dasharray: 89, 125; stroke-dashoffset: -35;  }
      100% { stroke-dasharray: 89, 125; stroke-dashoffset: -124; }
    }

    .status-uploading span {
      font-size: 0.95rem;
      color: var(--text-secondary);
    }

    /* ===== Success: circle + check draw in ===== */
    .status-success {
      animation: fade-up 0.25s ease forwards;
    }

    .status-text {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .status-success .status-text { color: var(--success); }

    .success-icon { overflow: visible; }

    /* Circle draws itself clockwise from the top */
    .success-circle {
      fill: none;
      stroke: var(--success);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 138;   /* 2π × 22 ≈ 138 */
      stroke-dashoffset: 138;
      transform-origin: 26px 26px;
      transform: rotate(-90deg);
      animation: draw-circle 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    /* Checkmark draws itself after the circle finishes */
    .success-check {
      fill: none;
      stroke: var(--success);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 34;
      stroke-dashoffset: 34;
      animation: draw-check 0.35s ease forwards 0.45s;
    }

    @keyframes draw-circle { to { stroke-dashoffset: 0; } }
    @keyframes draw-check  { to { stroke-dashoffset: 0; } }

    /* ===== Error: shake ===== */
    .status-error {
      animation: fade-up 0.25s ease forwards;
    }

    .status-error .status-text { color: var(--error); }

    .error-icon {
      overflow: visible;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%,  100% { transform: translateX(0); }
      15%        { transform: translateX(-8px); }
      30%        { transform: translateX(7px); }
      45%        { transform: translateX(-5px); }
      60%        { transform: translateX(4px); }
      75%        { transform: translateX(-2px); }
      90%        { transform: translateX(2px); }
    }

    .error-detail {
      font-size: 0.78rem;
      color: var(--text-secondary);
      max-width: 320px;
      text-align: center;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== Restart link ===== */
    .restart-link {
      color: var(--link);
      text-decoration: none;
      font-size: 0.85rem;
    }

    .restart-link:hover { text-decoration: underline; }

    /* ===== Footer ===== */
    .footer {
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-secondary);
      padding: 12px 0;
      border-top: 1px solid var(--border);
    }
  </style>
</head>

<body>
  <h1>Upload Files</h1>

  <form method="post" action="{{.UploadHTTPPath}}" enctype="multipart/form-data" novalidate>
    <div class="upload-card">
      <div class="drop-zone" id="drop-zone">

        <!-- SVG marching-ants border -->
        <svg class="drop-outline" aria-hidden="true">
          <rect class="drop-outline-rect" x="0" y="0" width="100%" height="100%" rx="4" ry="4" />
        </svg>

        <!-- Idle / ready content -->
        <div class="drop-content">
          <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <g class="upload-arrow">
              <line x1="12" y1="15" x2="12" y2="3" />
              <polyline points="7 8 12 3 17 8" />
            </g>
            <line x1="4" y1="21" x2="20" y2="21" />
            <rect x="4" y="17" width="16" height="4" rx="1" />
          </svg>

          <input type="file" name="{{.UploadFileFormName}}" id="file-input" class="file-input" multiple />
          <label for="file-input" class="drop-label" id="drop-label">
            <span class="drop-label-strong" id="drop-label-strong">Choose files</span><span
              id="drop-label-rest"> or drag and drop here</span>
          </label>
          <span class="drop-hint">Multiple files supported</span>
        </div>

        <!-- Uploading -->
        <div class="status status-uploading">
          <svg class="upload-spinner" viewBox="25 25 50 50" aria-hidden="true">
            <circle class="spinner-track" cx="50" cy="50" r="20" />
            <circle class="spinner-arc"   cx="50" cy="50" r="20" />
          </svg>
          <span>Uploading&hellip;</span>
        </div>

        <!-- Success -->
        <div class="status status-success">
          <!-- 52×52 viewBox; circle r=22 centered at 26,26; circumference ≈ 138 -->
          <svg class="success-icon" width="52" height="52" viewBox="0 0 52 52" fill="none" aria-hidden="true">
            <circle class="success-circle" cx="26" cy="26" r="22" />
            <path   class="success-check"  d="M14 27 L22 35 L38 17" />
          </svg>
          <span class="status-text">Upload complete!</span>
          <a href="{{.UploadHTTPPath}}" class="restart-link restart">Upload more files</a>
        </div>

        <!-- Error -->
        <div class="status status-error">
          <svg class="error-icon" width="52" height="52" viewBox="0 0 52 52" fill="none"
            stroke="var(--error)" stroke-width="3" stroke-linecap="round" aria-hidden="true">
            <circle cx="26" cy="26" r="22" />
            <line x1="26" y1="16" x2="26" y2="29" />
            <circle cx="26" cy="37" r="2" fill="var(--error)" stroke="none" />
          </svg>
          <span class="status-text">Upload failed</span>
          <span class="error-detail" id="error-detail"></span>
          <a href="{{.UploadHTTPPath}}" class="restart-link restart">Try again</a>
        </div>

      </div>
    </div>

    <input type="hidden" name="token" value="{{.UploadToken}}" />
  </form>

  <div class="footer">Go Web Server {{.ApplicationVersion}}</div>

  <script>
    'use strict';
    (function () {
      var isAdvancedUpload = (function () {
        var div = document.createElement('div');
        return (('draggable' in div) || ('ondragstart' in div && 'ondrop' in div)) &&
          'FormData' in window && 'FileReader' in window;
      })();

      var form        = document.querySelector('form');
      var dropZone    = document.getElementById('drop-zone');
      var input       = document.getElementById('file-input');
      var labelStrong = document.getElementById('drop-label-strong');
      var labelRest   = document.getElementById('drop-label-rest');
      var errorDetail = document.getElementById('error-detail');
      var restartBtns = dropZone.querySelectorAll('.restart');
      var droppedFiles = false;

      function showFiles(files) {
        if (!files || files.length === 0) return;
        labelStrong.textContent = files.length > 1 ? files.length + ' files' : files[0].name;
        labelRest.textContent = ' selected';
      }

      function resetLabel() {
        labelStrong.textContent = 'Choose files';
        labelRest.textContent = ' or drag and drop here';
      }

      function triggerSubmit() {
        var ev = document.createEvent('HTMLEvents');
        ev.initEvent('submit', true, false);
        form.dispatchEvent(ev);
      }

      /* Ripple: remove + reflow + add so animation restarts every drop */
      function flashRipple() {
        dropZone.classList.remove('is-dropped');
        void dropZone.offsetWidth;
        dropZone.classList.add('is-dropped');
        setTimeout(function () { dropZone.classList.remove('is-dropped'); }, 600);
      }

      /* Ajax flag so the server responds with JSON */
      var ajaxFlag = document.createElement('input');
      ajaxFlag.type  = 'hidden';
      ajaxFlag.name  = 'ajax';
      ajaxFlag.value = '1';
      form.appendChild(ajaxFlag);

      /* Auto-submit when files are picked via dialog */
      input.addEventListener('change', function (e) {
        showFiles(e.target.files);
        triggerSubmit();
      });

      /* Drag and drop */
      if (isAdvancedUpload) {
        ['drag', 'dragstart', 'dragend', 'dragover', 'dragenter', 'dragleave', 'drop'].forEach(function (ev) {
          dropZone.addEventListener(ev, function (e) { e.preventDefault(); e.stopPropagation(); });
        });

        ['dragover', 'dragenter'].forEach(function (ev) {
          dropZone.addEventListener(ev, function () { dropZone.classList.add('is-dragover'); });
        });

        ['dragleave', 'dragend', 'drop'].forEach(function (ev) {
          dropZone.addEventListener(ev, function () { dropZone.classList.remove('is-dragover'); });
        });

        dropZone.addEventListener('drop', function (e) {
          droppedFiles = e.dataTransfer.files;
          showFiles(droppedFiles);
          flashRipple();
          triggerSubmit();
        });
      }

      /* Click anywhere on the zone (except label / status overlay) to open picker */
      dropZone.addEventListener('click', function (e) {
        if (!e.target.closest('.status') && !e.target.closest('label')) {
          input.click();
        }
      });

      /* Form submit — AJAX upload */
      form.addEventListener('submit', function (e) {
        if (dropZone.classList.contains('is-uploading')) return false;

        dropZone.classList.remove('is-error', 'is-success');
        dropZone.classList.add('is-uploading');

        if (isAdvancedUpload) {
          e.preventDefault();

          var data = new FormData(form);
          if (droppedFiles) {
            Array.prototype.forEach.call(droppedFiles, function (file) {
              data.append(input.name, file);
            });
          }

          var xhr = new XMLHttpRequest();
          xhr.open(form.method, form.action, true);

          xhr.onload = function () {
            dropZone.classList.remove('is-uploading');
            if (xhr.status >= 200 && xhr.status < 400) {
              var resp = JSON.parse(xhr.responseText);
              dropZone.classList.add(resp.success ? 'is-success' : 'is-error');
              if (!resp.success) errorDetail.textContent = resp.error || '';
            } else {
              dropZone.classList.add('is-error');
              errorDetail.textContent = 'Server error (' + xhr.status + ').';
            }
          };

          xhr.onerror = function () {
            dropZone.classList.remove('is-uploading');
            dropZone.classList.add('is-error');
            errorDetail.textContent = 'Network error — please try again.';
          };

          xhr.send(data);
        }
      });

      /* Restart: clear state and re-open picker */
      restartBtns.forEach(function (btn) {
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          dropZone.classList.remove('is-error', 'is-success');
          droppedFiles = false;
          input.value  = '';
          resetLabel();
          input.click();
        });
      });

      input.addEventListener('focus', function () { input.classList.add('has-focus'); });
      input.addEventListener('blur',  function () { input.classList.remove('has-focus'); });
    })();
  </script>
</body>

</html>
