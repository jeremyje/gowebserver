<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.FileName}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-header: #f5f6f8;
      --text: #1a1a1a;
      --text-secondary: #555;
      --border: #dde0e4;
      --link: #0366d6;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1b1e;
        --bg-header: #232528;
        --text: #e0e0e0;
        --text-secondary: #999;
        --border: #3a3d42;
        --link: #58a6ff;
      }
    }

    html {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      background: var(--bg);
      color: var(--text);
    }

    body { margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; }

    .file-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .back-link {
      color: var(--link);
      text-decoration: none;
      font-size: 0.875rem;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .back-link:hover { text-decoration: underline; }

    .file-name {
      font-weight: 600;
      font-size: 0.9375rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }

    .lang-badge {
      background: var(--border);
      color: var(--text-secondary);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
      font-family: ui-monospace, "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
      flex-shrink: 0;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .theme-select {
      font-size: 0.8125rem;
      padding: 4px 6px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
    }

    .raw-link {
      font-size: 0.8125rem;
      color: var(--link);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 10px;
      white-space: nowrap;
    }

    .raw-link:hover { text-decoration: underline; }

    .code-wrapper {
      flex: 1;
      overflow-x: auto;
    }

    .chroma {
      margin: 0 !important;
      min-height: 100%;
      font-size: 0.875rem;
      line-height: 1.6;
    }

    .chroma pre {
      margin: 0;
      padding: 16px 0;
    }

    .chroma .lnt, .chroma .ln {
      padding: 0 12px 0 8px;
      user-select: none;
      opacity: 0.5;
    }

    .oversized-notice {
      padding: 64px 24px;
      text-align: center;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .oversized-notice p { color: var(--text-secondary); font-size: 1rem; }

    .oversized-notice a {
      color: var(--link);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 8px 20px;
      border-radius: 6px;
    }

    .oversized-notice a:hover { text-decoration: underline; }

    .site-footer {
      padding: 8px 16px;
      font-size: 0.75rem;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
      text-align: right;
    }

    {{.ChromaCSS}}
  </style>
</head>

<body>
  <header class="file-header">
    <a class="back-link" href="{{.ParentPath}}">&#8592; Back</a>
    <span class="file-name" title="{{.FilePath}}">{{.FileName}}</span>
    {{if .Language}}<span class="lang-badge">{{.Language}}</span>{{end}}
    <div class="header-actions">
      {{if .AvailableThemes}}
      <select class="theme-select" onchange="window.location.href=this.value">
        {{range .AvailableThemes}}
        <option value="{{$.FilePath}}?view=rich&theme={{.}}"{{if eq . $.Theme}} selected{{end}}>{{.}}</option>
        {{end}}
      </select>
      {{end}}
      <a class="raw-link" href="{{.RawURL}}">Raw</a>
    </div>
  </header>

  {{if .Oversized}}
  <div class="oversized-notice">
    <p>This file is too large for rich view (limit: 10 MB).</p>
    <a href="{{.RawURL}}">Download raw file</a>
  </div>
  {{else}}
  <div class="code-wrapper">{{.HighlightedHTML}}</div>
  {{end}}

  <footer class="site-footer">gowebserver {{.ApplicationVersion}}</footer>
</body>

</html>
